<!DOCTYPE html>
<html>
<head>
  <title>My Project</title>
</head>

<body>

  <h1>My Project</h1>

  <!-- Image -->
  <img src="images/pic.png" alt="My Image">

  <!-- Link to code file -->
  <p><a href="code/example.py">View my Python file</a></p>

  <!-- Show code directly on page -->
  <pre id="code"></pre>

  <script>
    fetch("code/example.py")
      .then(res => res.text())
      .then(data => {
        document.getElementById("code").textContent = data;
      });
  </script>

</body>
</html>
