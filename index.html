<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Project</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #000;
      color: #fff;
    }
    pre {
      background: #111;
      color: #fff;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
    }
    img {
      max-width: 400px;
      display: block;
      margin-bottom: 20px;
      border: 1px solid #333;
    }
    a {
      color: #4ea3ff;
    }
  </style>
</head>
<body>

  <h1>My Project</h1>

  <!-- Image -->
  <h2>Wiring Diagram</h2>
  <img src="Pics/Wiring.jpg" alt="Wiring Diagram">

  <!-- Code Text File -->
  <h2>Code File</h2>
  <pre id="code-content">Loading code...</pre>

  <!-- README -->
  <h2>README</h2>
  <pre id="readme-content">Loading README...</pre>

  <script>
    // Load Code.text
    fetch("Code/Code.text")
      .then(response => response.text())
      .then(data => {
        document.getElementById("code-content").textContent = data;
      })
      .catch(() => {
        document.getElementById("code-content").textContent = "Failed to load code file.";
      });

    // Load README.md
    fetch("README.md")
      .then(response => response.text())
      .then(data => {
        document.getElementById("readme-content").textContent = data;
      })
      .catch(() => {
        document.getElementById("readme-content").textContent = "Failed to load README.";
      });
  </script>

</body>
</html>
